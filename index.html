<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Feed Connect</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div id="app">
        <header>
            <h1 class="logo"><span class="logo-dot"></span>Feed<span>Connect</span></h1>
            <span id="status-badge" class="status-badge loading" role="status" aria-live="polite"></span>
        </header>

        <nav>
            <button class="tab-btn active" data-tab="posts">Gerenciar Posts</button>
            <button class="tab-btn" data-tab="users">Gerenciar Usuários</button>
            <button class="tab-btn" data-tab="feed">Visualizar Feed</button>
        </nav>

        <main>

            <section id="panel-posts" class="panel active">
                <h2 class="section-title">Posts cadastrados</h2>
            </section>
            <section id="panel-users" class="panel">
                <h2 class="section-title">Usuários da rede</h2>
            </section>
            <section id="panel-feed" class="panel">
                <h2 class="section-title">Timeline pública</h2>
            </section>
            </main>
    </div>
	<script src="script.js"></script>
</body>
</html>
